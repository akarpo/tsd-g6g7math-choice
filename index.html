<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troy SD G6-G7 Math — Has IM + Detracking Outperformed Its Characteristics?</title>
<meta name="description" content="Troy School District G6-G7 Math analysis: pressure-testing Illustrative Mathematics + detracking against SEDA 2025.1 data and 295 level-matched peer districts.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0a1628;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 96px;
  }
  .slide {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border-radius: 4px;
    user-select: none;
    -webkit-user-drag: none;
  }
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 72px;
    height: 72px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.05);
  }
  .nav-btn:active:not(:disabled) {
    transform: translateY(-50%) scale(0.95);
  }
  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .nav-btn.prev { left: 16px; }
  .nav-btn.next { right: 16px; }
  .counter {
    position: fixed;
    top: 16px;
    right: 24px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
  }
  .label {
    position: fixed;
    top: 16px;
    left: 24px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
    max-width: calc(100% - 200px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #1F7A3D, #1F3A5F);
    transition: width 0.3s ease;
    z-index: 10;
  }
  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 10;
    font-weight: 500;
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .stage { padding: 20px 60px; }
    .nav-btn { width: 48px; height: 48px; font-size: 20px; }
    .label { max-width: calc(100% - 140px); font-size: 10px; }
    .counter { font-size: 11px; padding: 6px 10px; }
  }
  :fullscreen .stage,
  :-webkit-full-screen .stage {
    padding: 12px 80px;
  }
</style>
</head>
<body>

<div class="stage">
  <img class="slide" id="slide" alt="Slide" src="slides/01.png">
</div>

<div class="label" id="label">Title</div>
<div class="counter" id="counter">1 / 22</div>

<button class="nav-btn prev" id="prev" aria-label="Previous slide">&larr;</button>
<button class="nav-btn next" id="next" aria-label="Next slide">&rarr;</button>

<div class="progress" id="progress" style="width: 5%;"></div>
<div class="hint">&larr; &rarr; arrow keys  &bull;  F fullscreen  &bull;  Home/End for first/last</div>

<script>
  const TITLES = [
    "Title",
    "The question — and the one-line answer",
    "What Troy did and when",
    "Troy’s pre-COVID math position — strong, not invincible",
    "Troy fell 59 places in the national math rankings",
    "MI peer leaderboard: Troy fell from 2nd to 4th",
    "The post-COVID decline hit Troy hard in math",
    "The critical test: recovery during the IM window",
    "Among MI peers, Troy ranks 6th of 8 in recovery",
    "G7 math: the tracked-vs-IM comparison year",
    "The Asian subgroup crisis — 36% of Troy’s enrollment",
    "G7 Asian math is still declining under IM",
    "Every subgroup declined — but recovery is uneven",
    "M-STEP math proficiency: the numbers parents see",
    "San Francisco: 12 years of detracking, then reversal",
    "Cambridge, MA: detracked 2017–2019, now reversing",
    "The ‘50% Algebra 1’ claim — course access ≠ achievement",
    "What high-performing math districts do differently",
    "Illustrative Mathematics: evidence gaps",
    "Conclusions",
    "Methodology",
    "References",
  ];
  const TOTAL = 22;
  let current = 1;

  const cache = {};
  for (let i = 1; i <= TOTAL; i++) {
    const img = new Image();
    img.src = `slides/${String(i).padStart(2, "0")}.png`;
    cache[i] = img;
  }

  const slideEl = document.getElementById("slide");
  const counter = document.getElementById("counter");
  const label = document.getElementById("label");
  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");
  const progressEl = document.getElementById("progress");

  function show(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    current = n;
    const padded = String(n).padStart(2, "0");
    slideEl.src = `slides/${padded}.png`;
    counter.textContent = `${n} / ${TOTAL}`;
    label.textContent = TITLES[n - 1] || `Slide ${n}`;
    prevBtn.disabled = (n === 1);
    nextBtn.disabled = (n === TOTAL);
    progressEl.style.width = ((n / TOTAL) * 100).toFixed(2) + "%";
    history.replaceState(null, "", `#slide=${n}`);
  }
  function next() { show(current + 1); }
  function prev() { show(current - 1); }

  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
      e.preventDefault(); next();
    } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
      e.preventDefault(); prev();
    } else if (e.key === "Home") {
      e.preventDefault(); show(1);
    } else if (e.key === "End") {
      e.preventDefault(); show(TOTAL);
    } else if (e.key === "f" || e.key === "F") {
      e.preventDefault();
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    } else if (/^[0-9]$/.test(e.key)) {
      const n = parseInt(e.key, 10) || 10;
      if (n >= 1 && n <= TOTAL) show(n);
    }
  });

  let touchStartX = null;
  document.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener("touchend", (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx < 0) next(); else prev();
    }
    touchStartX = null;
  }, { passive: true });

  slideEl.addEventListener("click", (e) => {
    const rect = slideEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x > rect.width / 2) next(); else prev();
  });

  const m = location.hash.match(/slide=(\d+)/);
  if (m) show(parseInt(m[1], 10));
  else show(1);
</script>

</body>
</html>
